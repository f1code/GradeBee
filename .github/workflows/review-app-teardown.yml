name: Review App - Teardown

on:
  pull_request:
    types:
      - closed

jobs:
  teardown-review-app:
    name: Destroy review app
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Destroy review app via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: dokku
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_NAME="gradebee-pr-${{ github.event.number }}"
            if dokku apps:exists "$APP_NAME" 2>/dev/null; then
              dokku apps:destroy "$APP_NAME" --force
            fi
            dokku storage:destroy $APP_NAME --force
