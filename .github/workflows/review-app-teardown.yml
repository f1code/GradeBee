name: Review App - Teardown

on:
  pull_request:
    types:
      - closed

jobs:
  teardown-review-app:
    name: Destroy review app
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Destroy review app via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: dokku
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            APP_NAME="gradebee-pr-${{ github.event.number }}"
            dokku apps:destroy "$APP_NAME" --force || true
            dokku storage:destroy data-$APP_NAME --force || true

      - name: Clean up Github environment
        env:
          GH_TOKEN: ${{ secrets.ENV_ADMIN_TOKEN }}
        run: |
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/environments/pr-${{ github.event.number }} || true
