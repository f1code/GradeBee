name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run tests
    uses: ./.github/workflows/test.yml

  deploy:
    name: Build, push, and deploy
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gradebee:${{ github.sha }}
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}
            VITE_APP_VERSION=${{ github.sha }}

      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        with:
          envs: CLERK_SECRET_KEY,OPENAI_API_KEY,LETSENCRYPT_EMAIL
          host: ${{ secrets.DEPLOY_HOST }}
          username: dokku
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_NAME="gradebee"
            IMAGE="ghcr.io/${{ github.repository_owner }}/gradebee:${{ github.sha }}"

            dokku config:set --no-restart "$APP_NAME" \
              CLERK_SECRET_KEY="$CLERK_SECRET_KEY" \
              OPENAI_API_KEY="$OPENAI_API_KEY"

            dokku git:from-image "$APP_NAME" "$IMAGE"
            dokku letsencrypt:set ${APP_NAME} email $LETSENCRYPT_EMAIL
            dokku letsencrypt:active gradebee || dokku letsencrypt:enable gradebee
