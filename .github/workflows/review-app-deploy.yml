name: Review App - Deploy

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  test:
    name: Run tests
    uses: ./.github/workflows/test.yml

  deploy-review-app:
    name: Build, push, and deploy review app
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gradebee:pr-${{ github.event.number }}-${{ github.sha }}
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_APP_VERSION=pr-${{ github.event.number }}

      - name: Deploy review app via SSH
        uses: appleboy/ssh-action@v1
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: dokku
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: CLERK_SECRET_KEY,OPENAI_API_KEY,LETSENCRYPT_EMAIL
          script: |
            set -euo pipefail
            APP_NAME="gradebee-pr-${{ github.event.number }}"
            IMAGE="ghcr.io/${{ github.repository_owner }}/gradebee:pr-${{ github.event.number }}-${{ github.sha }}"

            # Create app if it does not already exist
            if ! dokku apps:exists "$APP_NAME" 2>/dev/null; then
              dokku apps:create "$APP_NAME"
              # Use a per-app host path so each review app gets its own isolated SQLite database
              dokku storage:mount "$APP_NAME" "/data/$APP_NAME:/data"
              # Inject backend runtime config; update on every deploy in case secrets rotate
            fi

            # Always (re-)apply runtime config so secret rotations propagate on re-deploy
            # DB_PATH follows the same convention as Ansible: /data/<app_name>.db inside the
            # container, which maps to /data/<app_name>/<app_name>.db on the host — fully
            # isolated from production (/data/gradebee/gradebee.db).
            dokku config:set --no-restart "$APP_NAME" \
              CLERK_SECRET_KEY="$CLERK_SECRET_KEY" \
              OPENAI_API_KEY="$OPENAI_API_KEY" \
              DB_PATH="/data/${APP_NAME}.db" \
              UPLOADS_DIR="/data/uploads"

            # Deploy the PR image (predeploy script in app.json runs migrations automatically)
            dokku git:from-image "$APP_NAME" "$IMAGE"
            dokku letsencrypt:set ${APP_NAME} email $LETSENCRYPT_EMAIL
            dokku letsencrypt:active ${APP_NAME} || dokku letsencrypt:enable ${APP_NAME}
