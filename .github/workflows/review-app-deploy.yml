name: Review App - Deploy

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  deploy-review-app:
    name: Build, push, and deploy review app
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/nicocrm/gradebee:pr-${{ github.event.number }}
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_APP_VERSION=pr-${{ github.event.number }}

      - name: Deploy review app via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_NAME="gradebee-pr-${{ github.event.number }}"
            IMAGE="ghcr.io/nicocrm/gradebee:pr-${{ github.event.number }}"

            # Create app if it does not already exist
            if ! dokku apps:exists "$APP_NAME" 2>/dev/null; then
              dokku apps:create "$APP_NAME"
              dokku storage:mount "$APP_NAME" /data:/data
            fi

            # Deploy the PR image (predeploy script in app.json runs migrations automatically)
            dokku git:from-image "$APP_NAME" "$IMAGE"
