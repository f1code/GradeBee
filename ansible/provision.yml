---
# Ansible playbook: provision a bare Ubuntu/Debian VPS as a production Dokku host.
#
# Usage:
#   ansible-playbook -i inventory ansible/provision.yml \
#     -e "dokku_domain=example.com" \
#     -e @secrets.yml
#
# Non-secret vars (log level, paths, etc.) live in ansible/vars.yml and are
# loaded automatically. Secret vars belong in secrets.yml (Ansible Vault).
#
# Required variables (in secrets.yml):
#   deploy_ssh_pubkey    - SSH public key injected into dokku's authorized_keys for git push deploys
#   ghcr_token           - GitHub PAT with read:packages for docker login ghcr.io
#   ghcr_user            - GitHub username / org owning the GHCR packages
#   grafana_loki_url     - Loki push URL (Scaleway Cockpit endpoint)
#   cockpit_token        - Scaleway Cockpit token (sent as X-Token header to Loki)
#   backup_s3_bucket     - S3 bucket URL (e.g. s3://gradebee-backups)
#   backup_s3_endpoint   - S3-compatible endpoint URL
#   backup_s3_region     - S3 region
#   backup_s3_access_key - S3 access key ID
#   backup_s3_secret_key - S3 secret access key
#   clerk_secret_key     - Clerk backend API key (set as Dokku config var)
#   openai_api_key       - OpenAI API key (set as Dokku config var)

- name: Provision Dokku server
  hosts: gradebee
  become: true

  vars_files:
    - vars.yml

  vars:
    dokku_version: "0.38.5"           # pin to a known-good release; bump deliberately
    app_name: gradebee
    data_dir: /data
    scripts_dir: /opt/gradebee/scripts
    backup_log: /var/log/gradebee-backup.log

  tasks:

    # ------------------------------------------------------------------
    # 1. System preparation
    # ------------------------------------------------------------------

    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Install base dependencies
      ansible.builtin.apt:
        name:
          - curl
          - git
          - ca-certificates
          - gnupg
          - sqlite3
          - awscli   # v1 from apt; adequate for s3 cp/ls/rm; see docs for upgrade path
        state: present

    - name: Ensure systemd-timesyncd is enabled and running (NTP)
      ansible.builtin.systemd:
        name: systemd-timesyncd
        enabled: true
        state: started

    # ------------------------------------------------------------------
    # 2. Dokku installation
    # NOTE: The Dokku bootstrap script also installs Docker as a dependency.
    # ------------------------------------------------------------------

    - name: Check if Dokku is already installed
      ansible.builtin.command: dokku version
      register: dokku_check
      changed_when: false
      failed_when: false

    - name: Download Dokku bootstrap script
      ansible.builtin.get_url:
        url: "https://dokku.com/bootstrap.sh"
        dest: /tmp/dokku-bootstrap.sh
        mode: "0755"
      when: dokku_check.rc != 0

    - name: Run Dokku unattended installer
      ansible.builtin.command: bash /tmp/dokku-bootstrap.sh
      environment:
        DOKKU_TAG: "v{{ dokku_version }}"
      when: dokku_check.rc != 0
      register: dokku_install
      changed_when: dokku_install.rc == 0

    - name: Get current Dokku global domain
      ansible.builtin.command: dokku domains:report --global
      register: dokku_domain_report
      changed_when: false
      failed_when: false

    - name: Set Dokku global VHOST domain (only if not already set)
      ansible.builtin.command: "dokku domains:set-global {{ dokku_domain }}"
      when: dokku_domain not in (dokku_domain_report.stdout | default(''))
      changed_when: true

    # ------------------------------------------------------------------
    # 3. Dokku app setup
    # ------------------------------------------------------------------

    - name: Check if Dokku app exists
      ansible.builtin.command: "dokku apps:exists {{ app_name }}"
      register: app_exists
      changed_when: false
      failed_when: false

    - name: Create Dokku app
      ansible.builtin.command: "dokku apps:create {{ app_name }}"
      when: app_exists.rc != 0
      changed_when: true

    - name: Ensure persistent data directory exists
      ansible.builtin.file:
        path: "{{ data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      # NOTE: Container write access to /data depends on the Dockerfile USER directive.
      # Verify when task #14 (app packaging) sets a non-root user.

    - name: Get current Dokku storage mounts for app
      ansible.builtin.command: "dokku storage:list {{ app_name }}"
      register: storage_list
      changed_when: false
      failed_when: false

    - name: Mount /data volume for SQLite persistence
      ansible.builtin.command: "dokku storage:mount {{ app_name }} {{ data_dir }}:{{ data_dir }}"
      when: data_dir not in (storage_list.stdout | default(''))
      changed_when: true

    - name: Ensure dokku user authorized_keys directory exists
      ansible.builtin.file:
        path: /home/dokku/.ssh
        state: directory
        owner: dokku
        group: dokku
        mode: "0700"

    - name: Inject deployment SSH public key into dokku authorized_keys
      ansible.builtin.authorized_key:
        user: dokku
        key: "{{ deploy_ssh_pubkey }}"
        state: present
        manage_dir: false
        path: /home/dokku/.ssh/authorized_keys

    - name: Ensure /home/dokku/.ssh/authorized_keys has correct permissions
      ansible.builtin.file:
        path: /home/dokku/.ssh/authorized_keys
        owner: dokku
        group: dokku
        mode: "0600"

    - name: Authenticate Docker with GHCR
      ansible.builtin.command: >
        docker login ghcr.io
        --username {{ ghcr_user }}
        --password-stdin
      args:
        stdin: "{{ ghcr_token }}"
      changed_when: true
      no_log: true

    # ------------------------------------------------------------------
    # 3b. Dokku application environment variables
    # ------------------------------------------------------------------

    - name: Set Dokku app environment variables
      ansible.builtin.command: >
        dokku config:set --no-restart {{ app_name }}
        CLERK_SECRET_KEY={{ clerk_secret_key }}
        OPENAI_API_KEY={{ openai_api_key }}
        DB_PATH={{ app_db_path }}
        UPLOADS_DIR={{ app_uploads_dir }}
        UPLOAD_RETENTION_HOURS={{ app_upload_retention_hours }}
        ALLOWED_ORIGIN={{ app_allowed_origin }}
        LOG_LEVEL={{ app_log_level }}
        LOG_FORMAT={{ app_log_format }}
      changed_when: true
      no_log: true

    # ------------------------------------------------------------------
    # 4. Grafana Alloy installation & configuration
    # ------------------------------------------------------------------

    - name: Create APT keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Grafana GPG key (armored)
      ansible.builtin.get_url:
        url: https://apt.grafana.com/gpg.key
        dest: /tmp/grafana-gpg.key
        mode: "0644"

    - name: Dearmor Grafana GPG key into keyring
      ansible.builtin.command: >
        gpg --dearmor -o /etc/apt/keyrings/grafana.gpg /tmp/grafana-gpg.key
      args:
        creates: /etc/apt/keyrings/grafana.gpg

    - name: Add Grafana APT repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main"
        filename: grafana
        state: present

    - name: Install Grafana Alloy
      ansible.builtin.apt:
        name: alloy
        state: present
        update_cache: true

    - name: Deploy Alloy configuration
      ansible.builtin.template:
        src: templates/alloy-config.alloy.j2
        dest: /etc/alloy/config.alloy
        owner: root
        group: alloy
        mode: "0640"
      notify: Restart Alloy

    # Flush handlers immediately so Alloy starts with the correct config,
    # not the package-default config that was written at install time.
    - name: Flush handlers to apply Alloy config before starting service
      ansible.builtin.meta: flush_handlers

    - name: Add alloy user to docker group (for container log scraping)
      ansible.builtin.user:
        name: alloy
        groups: docker
        append: true

    - name: Enable and start Alloy service
      ansible.builtin.systemd:
        name: alloy
        enabled: true
        state: started
        daemon_reload: true

    # ------------------------------------------------------------------
    # 5. Backup infrastructure
    # ------------------------------------------------------------------

    - name: Ensure scripts directory exists
      ansible.builtin.file:
        path: "{{ scripts_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy backup script
      ansible.builtin.template:
        src: templates/backup-db.sh.j2
        dest: "{{ scripts_dir }}/backup-db.sh"
        owner: root
        group: root
        mode: "0755"

    # Ensure /root/.aws parent directory exists before writing config files.
    - name: Ensure /root/.aws directory exists
      ansible.builtin.file:
        path: /root/.aws
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Configure AWS CLI for S3-compatible backup storage
      ansible.builtin.blockinfile:
        path: /root/.aws/config
        create: true
        mode: "0600"
        block: |
          [default]
          s3 =
            endpoint_url = {{ backup_s3_endpoint }}
          region = {{ backup_s3_region }}

    - name: Write AWS credentials for backup
      ansible.builtin.copy:
        dest: /root/.aws/credentials
        owner: root
        group: root
        mode: "0600"
        content: |
          [default]
          aws_access_key_id = {{ backup_s3_access_key }}
          aws_secret_access_key = {{ backup_s3_secret_key }}
      no_log: true

    - name: Ensure backup log file exists
      ansible.builtin.file:
        path: "{{ backup_log }}"
        state: touch
        owner: root
        group: root
        mode: "0644"
        modification_time: preserve
        access_time: preserve

    # RPO note: 6-hourly matches the original cloud-init cadence; daily (03:00) was an
    # unintentional regression. See docs/deployment.md for retention policy.
    - name: Install 6-hourly backup cron job
      ansible.builtin.cron:
        name: gradebee-db-backup
        minute: "0"
        hour: "*/6"
        user: root
        job: "{{ scripts_dir }}/backup-db.sh >> {{ backup_log }} 2>&1"
        state: present

    # Migration note: if this playbook is applied to a host that previously used
    # the Terraform/Docker Compose layout, the live SQLite database is at
    # /opt/gradebee/data/gradebee.db, not /data/gradebee.db. Before running the
    # playbook on such a host, manually copy the database:
    #   cp /opt/gradebee/data/gradebee.db /data/gradebee.db
    # The backup script targets /data/gradebee.db exclusively; old data will not
    # be backed up until the manual migration is done.

    # ------------------------------------------------------------------
    # 6. TLS — Dokku Let's Encrypt plugin
    # ------------------------------------------------------------------
    # Installs the plugin and configures the contact email + auto-renewal
    # cron. Run `dokku letsencrypt:enable gradebee` manually after the
    # first deploy, once the domain is resolving to this server.

    - name: Check if dokku-letsencrypt plugin is installed
      ansible.builtin.command: dokku plugin:list
      register: dokku_plugins
      changed_when: false

    - name: Install dokku-letsencrypt plugin
      ansible.builtin.command: dokku plugin:install https://github.com/dokku/dokku-letsencrypt.git
      when: "'letsencrypt' not in dokku_plugins.stdout"
      changed_when: true

    - name: Set Let's Encrypt contact email for app
      ansible.builtin.command: "dokku letsencrypt:set {{ app_name }} email {{ letsencrypt_email }}"
      changed_when: true

    - name: Enable Let's Encrypt auto-renewal cron job
      ansible.builtin.command: dokku letsencrypt:cron-job --add
      changed_when: true

  handlers:
    - name: Restart Alloy
      ansible.builtin.systemd:
        name: alloy
        state: restarted
