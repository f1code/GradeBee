---
# Convenience wrapper: runs server-level and app-level provisioning in order.
# Use this for first-time setup or when you want to provision everything in one pass.
#
# Usage:
#   make infra-provision
#   # or
#   ansible-playbook -i inventory ansible/provision.yml -e @secrets.yml
#
# For targeted runs:
#   make infra-server   — server setup only (apt, Dokku, Alloy, GHCR login, AWS CLI)
#   make infra-app      — app setup only (create app, config vars, deploy, TLS, backup cron)

- import_playbook: provision-server.yml
- import_playbook: provision-app.yml
