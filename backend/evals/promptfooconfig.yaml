    assert:
      - type: llm-rubric
        value: |
          Source notes (ground truth — every statement in the report must be traceable to these):
          {{notes}}

          Style examples (the report's tone and vocabulary should match these):
          {{examples}}

          Reference report (a known-good output for the same notes — use as a quality benchmark, student name may differ):
          {{reference}}

          The report must follow the three-section structure (Participation/Motivation, Learning
          process, Behaviour) plus a Final comment, as shown in the examples. The notes include
          absences and mixed behaviour — the report should handle these accurately without
          inventing positive observations. Score 1-5 on:
          - structure: three sections + final comment, each with Assessment and Comment
          - grounding: every statement traceable to notes (no invented observations)
          - absences: absent sessions noted correctly, not fabricated into positive observations
          - tone: warm but honest, matches examples

  - description: "report: fairy-tales level with behaviour/work/performance structure"
