      notes: "file://fixtures/reports/oliver_with_examples/notes.json"
      examples: "file://fixtures/reports/oliver_with_examples/examples.json"
      instructions: ""
      reference: "file://fixtures/reports/oliver_with_examples/reference.html"
    assert:
      - type: llm-rubric
        value: |
          Source notes (ground truth — every statement in the report must be traceable to these):
          {{notes}}

          Style examples (the report's tone and vocabulary should match these):
          {{examples}}

          Reference report (a known-good output for the same notes — use as a quality benchmark, student name may differ):
          {{reference}}

          The report must follow the three-section structure (Participation/Motivation, Learning
          process, Behaviour) plus a Final comment, as shown in the examples. Each section should
          include an Assessment rating and a Comment paragraph. The tone should be warm and
          encouraging. All observations must be grounded in the source notes. Score 1-5 on:
          - structure: three sections + final comment, each with Assessment and Comment
          - grounding: every statement traceable to notes (no invented observations); must not
            invent Marks, test scores, absences counts, or audio-frequency fields not in the notes
          - tone: warm, encouraging, matches examples

  - description: "report: sam-level with many notes including absences and mixed behaviour"
    providers:
      - gradebee-report-2
      - gradebee-report-3
    vars:
      task: build-report-prompt
      student_name: "Thomas"
